services:
  - type: web
    name: wholesaleos
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx next build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: NEXT_PUBLIC_APP_NAME
        value: WholesaleOS
      - key: NEXT_PUBLIC_APP_TAGLINE
        value: Enterprise Wholesale Management
    disk:
      name: data
      mountPath: /opt/render/project/src/prisma
      sizeGB: 1
