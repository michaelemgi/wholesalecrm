services:
  - type: web
    name: wholesaleos
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx prisma generate && npx next build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: DATABASE_URL="file:/opt/render/project/src/prisma/dev.db" npx prisma db push --skip-generate && DATABASE_URL="file:/opt/render/project/src/prisma/dev.db" npx prisma db seed; DATABASE_URL="file:/opt/render/project/src/prisma/dev.db" node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:/opt/render/project/src/prisma/dev.db
      - key: NEXT_PUBLIC_APP_NAME
        value: WholesaleOS
      - key: NEXT_PUBLIC_APP_TAGLINE
        value: Enterprise Wholesale Management
    disk:
      name: data
      mountPath: /opt/render/project/src/prisma
      sizeGB: 1
