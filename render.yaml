databases:
  - name: wholesalecrm-db
    plan: free
    databaseName: wholesalecrm
    user: wholesalecrm

services:
  - type: web
    name: wholesalecrm
    plan: free
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wholesalecrm-db
          property: connectionString
      - key: NODE_ENV
        value: production
