services:
  - type: web
    name: wholesaleos
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npx prisma generate && npx next build && cp -r .next/static .next/standalone/.next/
    startCommand: npx prisma db push --skip-generate && npx prisma db seed; node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:/data/wholesaleos.db
      - key: NEXT_PUBLIC_APP_NAME
        value: WholesaleOS
      - key: NEXT_PUBLIC_APP_TAGLINE
        value: Enterprise Wholesale Management
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
